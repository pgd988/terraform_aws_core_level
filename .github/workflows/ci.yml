name: CI вЂ“ Trivy Scan & Terraform Plan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write   # allows posting plan comments on PRs

env:
  AWS_REGION: eu-central-1
  TF_VERSION: "1.9.8"
  AWS_DEPLOY_ROLE_ARN: "arn:aws:iam::308488463057:role/GitHubActionsRole"

jobs:
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 1 вЂ“ Trivy IaC / config scan
  # Fails the pipeline on any CRITICAL finding.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  trivy-scan:
    name: Trivy Config Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: "."
          # Fail only on CRITICAL severity findings
          severity: CRITICAL
          exit-code: "1"
          format: table
          # Scan all IaC-relevant files in the repo
          skip-dirs: ".terraform,.git"
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 2 вЂ“ Terraform plan (matrix over all modules)
  # Only runs when trivy-scan passes (no CRITs).
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-plan:
    name: Terraform Plan вЂ“ ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: trivy-scan   # gate: only proceed if scan is clean

    strategy:
      fail-fast: false   # plan all modules even if one fails
      matrix:
        module:
          - bootstrap
          - global
          - iam
          - network

    # Authenticate to AWS via OIDC вЂ“ no long-lived keys stored in secrets.
    # Prerequisites: create an IAM OIDC provider for GitHub and an IAM role
    # that trusts this repo. Store the role ARN in the secret below.
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: terraform init -input=false

      - name: Terraform Validate вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: terraform validate

      - name: Terraform Plan вЂ“ ${{ matrix.module }}
        id: tf-plan
        working-directory: ${{ matrix.module }}
        run: |
          set -o pipefail
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan.binary 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MODULE: ${{ matrix.module }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(`${process.env.MODULE}/plan.txt`, 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `## Terraform Plan вЂ“ \`${process.env.MODULE}\`\n\`\`\`\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload plan artifact вЂ“ ${{ matrix.module }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}-${{ github.run_id }}
          path: ${{ matrix.module }}/tfplan.binary
          retention-days: 7

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Job 3 вЂ“ Terraform apply (matrix over all modules)
  # Only runs on pushes to main (never on PRs).
  # Applies the exact binary plan produced in Job 2.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  terraform-apply:
    name: Terraform Apply вЂ“ ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: terraform-plan          # gate: plan must pass first
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false             # apply remaining modules even if one fails
      matrix:
        module:
          - bootstrap
          - global
          - iam
          - network

    environment: production        # в†ђ manual gate: requires reviewer approval in GitHub Settings в†’ Environments в†’ production

    permissions:
      contents: read
      id-token: write              # required for OIDC token exchange

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-tf-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: terraform init -input=false

      - name: Download plan artifact вЂ“ ${{ matrix.module }}
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}-${{ github.run_id }}
          path: ${{ matrix.module }}

      - name: Terraform Apply вЂ“ ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: terraform apply -input=false -auto-approve tfplan.binary
